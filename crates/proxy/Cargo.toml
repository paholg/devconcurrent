[package]
name = "devconcurrent-proxy"
version = "0.0.13"
edition = "2024"
description = "DNS + reverse proxy service for devconcurrent devcontainers"
publish = false

[dependencies]
async-trait = "0.1.89"
axum = "0.8.9"
bytes = "1.11.1"
docker = { path = "../docker", version = "0.0.0" }
eyre = "0.6.12"
futures-util = "0.3.32"
handlebars = "6.4.1"
hickory-proto = "0.26.1"
hickory-server = "0.26.1"
http = "1.4.0"
http-body-util = "0.1.3"
hyper = "1.9.0"
hyper-util = "0.1.20"
hyperlocal = "0.9.1"
indexmap.workspace = true
serde.workspace = true
serde_json.workspace = true
shared = { path = "../shared", version = "0.0.0" }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
